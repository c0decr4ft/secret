<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site not found · GitHub Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; }
    .screen { display: none; height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* Error screen */
    #screen-secret {
      align-items: center;
      justify-content: center;
      background: #ff69b4;
      padding: 2rem;
    }
    .fake-404 { text-align: center; max-width: 500px; }
    .fake-404 .title { font-size: 100px; font-weight: 200; color: #666; margin-bottom: 1rem; }
    .fake-404 h2 { font-size: 1.2rem; color: #666; margin-bottom: 1rem; }
    .fake-404 p { font-size: 0.9rem; color: #888; line-height: 1.5; margin-bottom: 0.5rem; }
    #code-input {
      display: block;
      width: 60px;
      height: 1px;
      margin: 30px auto;
      padding: 0;
      border: none;
      background: #ddd;
      font-size: 16px;
      color: transparent;
      cursor: pointer;
      transition: width 0.2s, height 0.2s, padding 0.2s;
    }
    #code-input:focus {
      outline: none;
      width: 180px;
      height: 1.5rem;
      padding: 0.2rem 0.5rem;
      background: rgba(255,255,255,0.9);
      color: #333;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #code-input::placeholder { color: #999; }
    .fake-404-footer { font-size: 0.8rem; color: #999; margin-top: 1rem; }

    /* Cards */
    #screen-cards {
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 2rem;
      background: #fff;
    }
    .card {
      width: 160px;
      height: 200px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .card:hover { background: #eee; }
    .card-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
      margin-bottom: 0.8rem;
    }
    .card-name { font-weight: 600; }

    /* Chat */
    #screen-chat { background: #fff; }
    .chat-header {
      padding: 1rem;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-header button { padding: 0.4rem 0.8rem; cursor: pointer; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .msg {
      max-width: 80%;
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
      font-size: 0.9rem;
    }
    .msg.sent { align-self: flex-end; background: #333; color: #fff; }
    .msg.received { align-self: flex-start; background: #eee; color: #333; }
    .chat-input-bar {
      padding: 1rem;
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid #eee;
    }
    #chat-input { flex: 1; padding: 0.6rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 8px; }
    .send-btn { padding: 0.6rem 1rem; background: #333; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <div id="screen-secret" class="screen active">
    <div class="fake-404">
      <div class="title">404</div>
      <h2>File not found</h2>
      <p>The site configured at this address does not contain the requested file.</p>
      <input type="text" id="code-input" placeholder="" autocomplete="off" title="Click to enter code">
      <div class="fake-404-footer">GitHub Status</div>
    </div>
  </div>

  <div id="screen-cards" class="screen"></div>

  <div id="screen-chat" class="screen">
    <div class="chat-header">
      <button onclick="goBack()">← Back</button>
      <div id="chat-tabs" style="display:flex;gap:0.5rem;flex:1;justify-content:center;"></div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBky-dq76Uic181p8BUwAN-rVyJ9Brte4w",
      authDomain: "secret-chat-app-9f5db.firebaseapp.com",
      databaseURL: "https://secret-chat-app-9f5db-default-rtdb.firebaseio.com",
      projectId: "secret-chat-app-9f5db",
      storageBucket: "secret-chat-app-9f5db.firebasestorage.app",
      messagingSenderId: "723249335922",
      appId: "1:723249335922:web:895c26ccd1161db9903ceb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const PASSPHRASE = 'liath';
    const DEFAULT_ACCOUNTS = {
      luca: { id: 'luca', displayName: 'Luca' },
      matteo: { id: 'matteo', displayName: 'Matteo' },
      nora: { id: 'nora', displayName: 'Nora' }
    };

    let accounts = [];
    let me = null;
    let currentPartner = null;
    let chatListenerRef = null;

    function show(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function esc(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    // Type "liath" to unlock
    document.getElementById('code-input').addEventListener('input', function() {
      if (this.value.toLowerCase().trim() === PASSPHRASE) {
        this.value = '';
        loadAccounts();
      }
    });

    function loadAccounts() {
      db.ref('accounts').once('value', snap => {
        if (!snap.exists()) {
          db.ref('accounts').set(DEFAULT_ACCOUNTS).then(loadAccounts);
          return;
        }
        const data = snap.val();
        accounts = Object.keys(data).map(k => ({ id: k, displayName: data[k].displayName }));
        buildCards();
        show('screen-cards');
      });
    }

    function buildCards() {
      const el = document.getElementById('screen-cards');
      const colors = ['#667eea', '#f5576c', '#4facfe'];
      el.innerHTML = '';
      accounts.forEach((a, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => login(a.id);
        card.innerHTML = '<div class="card-avatar" style="background:' + colors[i % 3] + '">' + esc(a.displayName[0]) + '</div><div class="card-name">' + esc(a.displayName) + '</div>';
        el.appendChild(card);
      });
    }

    function login(id) {
      const acct = accounts.find(a => a.id === id);
      if (!acct) return;
      me = acct;
      const others = accounts.filter(a => a.id !== id);
      currentPartner = others[0]?.id;
      if (!currentPartner) return;
      show('screen-chat');
      switchChat(currentPartner);
    }

    function renderTabs() {
      const tabs = document.getElementById('chat-tabs');
      tabs.innerHTML = '';
      accounts.filter(a => a.id !== me.id).forEach(a => {
        const btn = document.createElement('button');
        btn.textContent = a.displayName;
        btn.style.padding = '0.3rem 0.6rem';
        btn.style.fontSize = '0.85rem';
        btn.style.background = a.id === currentPartner ? '#333' : '#eee';
        btn.style.color = a.id === currentPartner ? '#fff' : '#333';
        btn.style.border = 'none';
        btn.style.borderRadius = '4px';
        btn.style.cursor = 'pointer';
        btn.onclick = () => switchChat(a.id);
        tabs.appendChild(btn);
      });
    }

    function switchChat(partnerId) {
      if (chatListenerRef) chatListenerRef.off();
      currentPartner = partnerId;
      renderTabs();

      const key = [me.id, partnerId].sort().join('_');
      const c = document.getElementById('chat-messages');
      c.innerHTML = '<div style="color:#999">Loading...</div>';

      chatListenerRef = db.ref('chats/' + key).orderByChild('time');
      chatListenerRef.on('value', snap => {
        c.innerHTML = '';
        const data = snap.val();
        if (!data) {
          c.innerHTML = '<div style="color:#999">No messages yet. Say hi!</div>';
        } else {
          Object.values(data).sort((a, b) => a.time - b.time).forEach(m => appendMsg(m));
        }
        c.scrollTop = c.scrollHeight;
      });
      document.getElementById('chat-input').focus();
    }

    function appendMsg(msg) {
      const c = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'msg ' + (msg.from === me.id ? 'sent' : 'received');
      div.textContent = msg.text;
      c.appendChild(div);
      c.scrollTop = c.scrollHeight;
    }

    function sendMessage() {
      const inp = document.getElementById('chat-input');
      const text = inp.value.trim();
      if (!text || !me || !currentPartner) return;
      const key = [me.id, currentPartner].sort().join('_');
      db.ref('chats/' + key).push({ from: me.id, text, time: Date.now() });
      inp.value = '';
      inp.focus();
    }

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function goBack() {
      if (chatListenerRef) chatListenerRef.off();
      me = null;
      currentPartner = null;
      loadAccounts();
    }
  </script>
</body>
</html>
